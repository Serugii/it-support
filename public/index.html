<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Аналіз студентів</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <div class="card">
    <h1>Аналіз активності студентів</h1>

    <div class="tabs">
      <button onclick="showTab('analysis', this)">Аналіз</button>
      <button onclick="showTab('data', this)">Дані</button>
    </div>
  </div>


  <div id="analysis" class="tab active">

    <div class="card">
      <button id="analyzeBtn">Аналізувати</button>
      <p id="currentStatus">Статус: очікування...</p>
    </div>

    <div class="card">
      <h2>Оцінки студентів</h2>
      <canvas id="chart"></canvas>
    </div>

    <div class="card" id="clusterCard">
      <h2>Кластери студентів</h2>
      <canvas id="clusterChart"></canvas>
    </div>

    <div class="card" id="riskCard">
      <h2>Група ризику</h2>
      <table id="studentsTable"></table>
      <div id="riskBlock"></div>
    </div>

  </div>

  <div id="data" class="tab">

    <div class="card">
      <h2>Дані студентів</h2>

      <div id="studentsForm"></div>

      <div style="margin-top:10px;">
        <button onclick="addStudentForm()">Додати</button>
        <button onclick="submitStudents()">Зберегти</button>
        <button onclick="clearStudents()" class="secondary">Очистити</button>
      </div>
    </div>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="script.js"></script>

</body>
</html>
